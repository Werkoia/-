<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>моя страница</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,500&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-deep: #29394a;
    --sky-mid: #4a6478;
    --flag-blue: #7fc2e0;
    --flag-pink: #f0aec2;
    --paper: #f6f1ec;
    --ink: #1c232b;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    min-height: 100%;
  }

  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, var(--sky-mid) 0%, var(--sky-deep) 60%),
      var(--sky-deep);
    color: var(--paper);
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: clamp(24px, 6vw, 64px) 20px;
    overflow-x: hidden;
  }

  .flag-stage{
    position: relative;
    width: min(560px, 90vw);
    margin-top: clamp(16px, 4vh, 48px);
  }

  .flag-stage::before{
    content: "";
    position: absolute;
    inset: -18%;
    background: radial-gradient(circle, var(--flag-blue) 0%, transparent 65%);
    opacity: 0.25;
    filter: blur(30px);
    z-index: 0;
  }

  .flag-stage img{
    position: relative;
    z-index: 1;
    display: block;
    width: 100%;
    height: auto;
    border-radius: 18px;
    -webkit-mask-image: radial-gradient(ellipse 78% 78% at 50% 50%, black 62%, transparent 100%);
            mask-image: radial-gradient(ellipse 78% 78% at 50% 50%, black 62%, transparent 100%);
    animation: sway 6s ease-in-out infinite;
    transform-origin: 15% 50%;
  }

  @keyframes sway{
    0%, 100% { transform: rotate(-0.6deg) translateY(0); }
    50%      { transform: rotate(0.6deg) translateY(-4px); }
  }

  .divider{
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, var(--flag-blue), var(--flag-pink));
    border: none;
    border-radius: 2px;
    margin: clamp(28px, 5vh, 56px) 0 clamp(20px, 4vh, 36px);
  }

  .statement{
    width: min(640px, 92vw);
    text-align: center;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-style: italic;
    font-size: clamp(1.4rem, 3.4vw, 2.4rem);
    line-height: 1.35;
    color: var(--paper);
    outline: none;
    padding: 0.2em 0.3em;
    border-radius: 10px;
    transition: background 0.2s ease;
  }

  .statement:hover,
  .statement:focus{
    background: rgba(255,255,255,0.05);
  }

  .hint{
    margin-top: 18px;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--flag-blue);
    opacity: 0.7;
  }

  @media (prefers-reduced-motion: reduce){
    .flag-stage img{ animation: none; }
  }
</style>
</head>
<body>

  <div class="flag-stage">
    <img src="flag.gif" alt="флаг">
  </div>

  <hr class="divider">

  <!--
    ТЕКСТ РЕДАКТИРУЕТСЯ ЗДЕСЬ:
    просто замени фразу внутри <div class="statement"> ниже на свою.
    Можно писать в несколько предложений — размер шрифта подстроится сам.
  -->
  <div class="statement" contenteditable="true" spellcheck="false">
    LOUND AND PROUD
  </div>
  <div class="hint">нажми на текст выше, чтобы отредактировать</div>

</body>
</html>
